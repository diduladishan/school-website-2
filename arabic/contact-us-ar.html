<body>
   <div class="arabic_page">
<section class="admission-hero">
  <div class="admission-hero__tree-bg" aria-hidden="true"></div>

  <div class="about-us-main-texts">
    <h2 class="about-us-main-overview">
      <span class="banner_thin_txt">اتصل </span>
      بنا
    </h2>
  </div>

  <div class="colorful-leaf-divider-container">
    <div class="colorful-leaf-divider">
      <img src="../assets/images/colorful-leaves-divider/colorful-leaves.png" alt="Colorful Leaves" class="colorful_leaves">
      <img src="../assets/images/colorful-leaves-divider/mobile_banner_leaves.png" alt="Colorful Leaves" class="colorful_leaves mobile_leaves">
    </div>
  </div>
</section>


<section class="contact_main_section">
  <div class="contact_main_flex">
    <div class="contact_main_txt_wrap">
      <div class="contact_txt_flex">
        <div class="contact_icon_wrap">
          <img src="../assets/images/contact-us/contact_icon1.png" alt="icon" class="contact_icon">
        </div>
        <div class="contact_email_wrap">
          <div class="contact_email_flex">
            <label class="contact_txt_label">للقبول والتسجيل</label>
            <span class="contact_txt_label2">contact@daralmarefa.com</span>
          </div>
          <div class="contact_email_flex">
            <label class="contact_txt_label">للاتصال بالمدير</label>
            <span class="contact_txt_label2">principal@daralmarefa.ae</span>
          </div>
          <div class="contact_email_flex">
            <label class="contact_txt_label">استفسارات التسويق</label>
            <span class="contact_txt_label2">marketing@daralmarefa.ae</span>
          </div>
          <div class="contact_email_flex">
            <label class="contact_txt_label">للاستفسارات الأخرى</label>
            <span class="contact_txt_label2">info@daralmarefa.ae</span>
          </div>
        </div>
      </div>
      <div class="contact_txt_flex">
        <div class="contact_icon_wrap">
          <img src="../assets/images/contact-us/contact_icon2.png" alt="icon" class="contact_icon">
        </div>
        <div class="contact_email_wrap">
          <div class="contact_email_flex">
            <label class="contact_txt_label">العنوان</label>
            <span class="contact_txt_label2">marketing@daralmarefa.ae</span>
          </div>
        </div>
      </div>
      <div class="contact_txt_line"></div>
      <div class="contact_social_flex">
        <img src="../assets/images/contact-us/contact_social_icon1.png" alt="icon" class="contact_social_icon">
        <img src="../assets/images/contact-us/contact_social_icon2.png" alt="icon" class="contact_social_icon">
        <img src="../assets/images/contact-us/contact_social_icon3.png" alt="icon" class="contact_social_icon">
        <img src="../assets/images/contact-us/contact_social_icon4.png" alt="icon" class="contact_social_icon">
        <img src="../assets/images/contact-us/contact_social_icon5.png" alt="icon" class="contact_social_icon">
      </div>
      <div class="contact_img_flex">
        <img src="../assets/images/contact-us/contact_img1.png" class="contact_img" alt="img">
        <img src="../assets/images/contact-us/contact_img2.png" class="contact_img" alt="img">
      </div>
      <div class="contact_img_flex">
        <img src="../assets/images/contact-us/contact_img3.png" class="contact_img" alt="img">
      </div>
    </div>
    <div class="contact_main_form_wrap">
      <form id="contactFormAr">
        <div class="contact_form_flex">
          <div class="form_main_input">
            <label class="form_label">الاسم الأول</label>
            <input type="text" name="first_name" class="form_date" placeholder="أدخل الاسم الأول">
          </div>
          <div class="form_main_input">
            <label class="form_label">اسم العائلة</label>
            <input type="text" name="last_name" class="form_date" placeholder="أدخل اسم العائلة">
          </div>
        </div>
        <div class="contact_form_flex">
          <div class="form_main_input">
            <label class="form_label">بريدك الإلكتروني</label>
            <input type="text" name="email" class="form_date" placeholder="أدخل بريدك الإلكتروني">
          </div>
        </div>
        <div class="contact_form_flex">
          <div class="form_main_input">
            <label class="form_label">رقم الهاتف المحمول</label>
            <input type="text" name="phone" class="form_date form_phone_input" placeholder="+971 000 000 000">
          </div>
        </div>
        <div class="contact_form_flex">
          <div class="form_main_input">
            <label class="form_label">الموضوع</label>
            <input type="text" name="subject" class="form_date" placeholder="أدخل بريدك الإلكتروني">
          </div>
        </div>
        <div class="contact_form_flex">
          <div class="form_main_input">
            <label class="form_label">الرسالة</label>
            <textarea rows="5" name="message" type="text" class="form_date" placeholder="أدخل الرسالة"></textarea>
          </div>
        </div>
        <div class="contact_btn_flex">
          <!-- <button type="submit" class="form-submit-btn admission-apply-btn form_step_btn" style="background-image: url(../assets/images/admission-book-a-tour/form_btn_bg.png) !important;">إرسال</button> -->
           <button type="submit" class="cta-button-wrapper cta-button-wrapper form-cta-button hero-cta-button form-submit-btn form_step_btn">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="200"
                height="80"
                viewBox="0 0 200 80"
                fill="none"
              >
                <path
                  class="button-path-bg"
                  d="M49.1556 16.0378C35.5696 19.3594 12.4824 26.5882 5.06401 39.2551C0.285518 47.4124 2.28556 55.9385 10.5072 60.6694C18.966 65.5421 33.7178 65.77 43.4448 66.1332C74.0211 67.2683 105.671 65.0179 135.774 59.6362C148.211 57.4119 174.55 52.9632 180.398 40.3249C186.245 27.6866 165.067 22.925 156.926 21.1559C121.786 13.5011 84.0925 7.50403 49.1556 16.0378Z"
                  fill="#BB133E"
                  transform="translate(97.5 36.5) scale(1.06) translate(-97.5 -36.5) translate(6 0)"
                />
                <path
                  class="cta-outline"
                  d="M68.5,27.8c54.7-12.7,111.7-15.3,167.3-7.5,24.1,3.4,48.6,5.8,72.2,11.8s38,9.3,53.3,20.6c4.1,3,7.9,6.6,9.9,11.2,4.1,9.4-.4,20.7-8,27.6-12.1,11-29.2,14.4-44.8,17.2-58.9,10.5-119.9,10.9-179.5,8.5-34.5-1.3-69.4-3.2-102.1-15.3-16.8-6.2-34.4-16.6-29-37.6,4.3-16.4,19.8-29.9,34.2-37.7,23.5-12.7,50.7-16.8,77-19,28.6-2.4,57.8-2.4,86.4-.5,46.5,2.9,92.6,11.1,137.2,24.4"
                  transform="matrix(0.514 0 0 0.514 9.8 -1.2)"
                />
              </svg>

              <div class="cta-button-text">إرسال</div>
            </button>
        </div>
      </form>
    </div>
  </div>
</section>



   <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery-validation@1.19.5/dist/jquery.validate.min.js"></script>
  <script src="../js/our-school-at-glance.js"></script>
  <script>
    $(document).ready(function () {
      if (typeof $.validator === "undefined") {
        console.error("jQuery Validation plugin not loaded");
        return;
      }
      // Custom UAE phone validation
      $.validator.addMethod("uaePhone", function (value, element) {
        return this.optional(element) || /^(?:\+9715|05)[0-9]{8}$/.test(value);
      }, "Enter valid UAE mobile number");

      // Apply validation
      $("#contactFormAr").validate({
        rules: {
          first_name: {
            required: true
          },
          last_name: {
            required: true
          },
          email: {
            required: true,
            email: true
          },
          phone: {
            required: true,
            uaePhone: true
          },
          subject: {
            required: true
          },
          message: {
            required: true
          }
        },
        messages: {
          first_name: "First name is required",
          last_name: "Last name is required",
          email: {
            required: "Email is required",
            email: "Enter valid email"
          },
          phone: {
            required: "Mobile number is required",
            uaePhone: "Enter valid UAE number (+9715XXXXXXXX or 05XXXXXXXX)"
          },
          subject: "Subject is required",
          message: "Message is required"
        },
        submitHandler: function (form) {
          console.log("Form submitted successfully!");
          form.submit();
        },
        invalidHandler: function () {
          // Runs when form has errors
          console.log("Form has errors - not submitted");
        }
      });
    })
  </script>
   </div>
</body>

</html>
